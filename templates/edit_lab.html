<form id="form1" name="form1" method="post" action="/edit_subject_post">
  <table width="357" border="1">

    <tr>
      <td>Lab no
        <label>
        <input type="text" name="textfield" value="{{ lab.labno }}" required pattern="[0-9]{6}" title="Enter valid Lab no"/>

  <tr>
      <td>Floor no

        <input type="text" name="textfield2" value="{{lab.floorno }}" required pattern="[0-9]{2}" title="Enter valid Floor no"/>

    <tr>
      <td><label>

</form>
