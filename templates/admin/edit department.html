{% extends 'admin/indexadmin.html' %}
{% block body %}
<html xmlns="http://www.w3.org/1999/xhtml">
<head>

<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
<title>Untitled Document</title>
    <style>

    /* Form container styling */
    .form-container {
      max-width: 400px;
      margin: 20px auto;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(113, 20, 0, 0.73);
      padding: 20px;
    }

    form label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    form input[type="text"],
    form input[type="submit"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 16px;
    }

    form input[type="submit"] {
      background-color: #711400;
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    form input[type="submit"]:hover {
      background-color: #000000;
    }

    /* Card container for displaying departments */
    .card-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      padding: 20px;
      margin-top: 20px;
    }

    /* Individual card styling */
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(113, 20, 0, 0.75);
      width: 300px; /* Set card width */
      padding: 15px;
      text-align: center;
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 1.5em;
      color: #007bff;
    }

    .card p {
      margin: 0 0 10px;
      color: #555;
    }

    /* Action buttons in the card */
    .card-actions a {
      text-decoration: none;
      color: #fff;
      background-color: #2606a7;
      padding: 8px 15px;
      border-radius: 4px;
      margin: 5px;
      display: inline-block;
    }

    .card-actions a:hover {
      background-color: #218838;
    }

    .card-actions .delete {
      background-color: #dc3545;
    }

    .card-actions .delete:hover {
      background-color: #c82333;
    }

  </style>
</head>
<body>
  <div class="card">
    <h4>EDIT DEPARTMENT</h4>
    <form id="form1" name="form1" method="post" action="/edit_department_post#stats">
      <label for="department">
        Department:
        <input type="text" id="department" name="textfield" value="{{ dep.department_name }}" required pattern="[a-zA-Z0-9 ]+" title="only letters,numbers and spaces are allowed"  title="Enter a valid department" />
      </label>
      <label for="details">
        Details:
        <input type="text" id="details" name="textfield2" value="{{ dep.details }}" required />
      </label>
      <div class="form-footer">
        <input type="submit" name="submit" value="SAVE" />
      </div>
    </form>
  </div>
</body>
</html>
{% endblock %}
