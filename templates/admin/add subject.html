{% extends 'admin/indexadmin.html' %}
{% block body %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Subject</title>
    <style>
        .card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
        }

        .card h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }

        input:hover,
        select:hover {
            border-color: #555;
        }

        input[type="submit"] {
            background-color: #8B0000;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: background-color 0.3s ease;
        }

        input[type="submit"]:hover {
            background-color: #a00000;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Add Subject</h2>
        <form action="/admin_add_subject_post#stats" method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <label for="course">Course</label>
            <select name="course" id="course" required>
                <option value="">Select Course</option>
                {% for i in course %}
                    <option value="{{ i.id }}">{{ i.course_name }}</option>
                {% endfor %}
            </select>

            <label for="subject">Subject</label>
            <input type="text" name="textfield2" id="subject" required pattern="[a-zA-Z0-9 ]+" title="only letters,numbers and spaces are allowed">

            <label for="semester">Semester</label>
            <input type="text" name="textfield3" id="semester" required pattern="[0-9]{1,2}" title="Enter valid semester">

            <label for="syllabus">Syllabus</label>
            <input type="file" name="textfield4" id="syllabus" required>

            <input type="submit" name="Submit" value="Add">
        </form>
    </div>
</body>
</html>


{% endblock %}
