{% extends 'admin/indexadmin.html' %}
{% block body %}
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
<title>Untitled Document</title>
<style>

  .form-container {
    max-width: 400px;
    margin: 0 auto;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(113, 20, 0, 0.64);
    padding: 20px;
  }

  .form-container table {
    width: 100%;
    border-collapse: collapse;
  }

  .form-container td {
    padding: 10px;
    vertical-align: top;
  }

  .form-container input[type="text"],
  .form-container input[type="file"],
  .form-container input[type="date"],
  .form-container select,
  .form-container input[type="submit"] {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
    border: 1px solid #711400;
    border-radius: 4px;
    font-size: 16px;
  }

  .form-container input[type="submit"] {
    background-color: #711400;
    color: #fff;
    border: none;
    cursor: pointer;
  }

  .form-container input[type="submit"]:hover {
    background-color: #711400;
  }
</style>
</head>

<body>
<div class="form-container">
<form id="form1" name="form1" method="post" action="/admin_add_exam_schedule_post#stats" enctype="multipart/form-data">
{% csrf_token %}
    <table width="364" border="1">
    <tr>
      <td>Subject
        <label>
           <select name="subject" required>
             {% for i in sub%}
                 <option value="{{ i.id }}">{{ i.subject }}</option>
            {% endfor %}
        </select>
        </label></td>
    </tr>
    <tr>
      <td>Staff
        <label>
 <select name="staff" required>
             {% for i in stf %}
                 <option value="{{ i.id }}">{{ i.name }}</option>
            {% endfor %}
        </select>        </label></td>
    </tr>
    <tr>
      <td>Time
        <label>
        <input type="time" name="textfield2" required/>
        </label></td>
    </tr>
    <tr>
      <td>Date
      <label>
          <input type="date" name="textfield" min="1990-01-01" max="2025-12-31" required/>
        </label></td>
    </tr>
  <tr>
      <td>Exam name
    <label>
        <input type="text" name="textfield3" required pattern="[a-zA-Z0-9 ]+" title="only letters,numbers and spaces are allowed"/>
        </label>
      </td>
  </tr>
  <tr>
      <td>Duration
     <label>
        <input type="text" name="textfield4" required pattern="[a-zA-Z0-9 ]+" title="only letters,numbers and spaces are allowed"/>
        </label> </td>
  </tr>
  <tr>
      <td>Syllabus
     <label>
        <input type="file" name="file2" required/>
        </label>  </td>
  </tr>
  <tr>
      <td>Details
       <label>
        <input type="text" name="textfield5" required placeholder="Details" title="Enter valid details"/>
        </label></td>
    </tr>
      <tr>
          <td colspan="2" style="text-align: center;">
            <input type="submit" name="Submit" value="Add" />
          </td>
        </tr>
  </table>
</form>
</div>
</body>
</html>
{% endblock %}
