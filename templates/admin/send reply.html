{% extends 'admin/indexadmin.html' %}
{% block body %}
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
<title>Send Reply</title>
<style>
    .card {
        background: #fff;
        width: 400px;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(113, 20, 0, 0.05);
        padding: 20px;
        border: 1px solid rgba(113, 20, 0, 0.9);
    }
    .card h2 {
        text-align: center;
        color: #333;
        margin-bottom: 20px;
        font-size: 22px;
    }
    .card form {
        display: flex;
        flex-direction: column;
    }
    .card label {
        margin-bottom: 10px;
        font-weight: bold;
        color: #555;
    }
    .card input[type="text"] {
        padding: 10px;
        font-size: 14px;
        border: 1px solid #ccc;
        border-radius: 4px;
        margin-bottom: 20px;
    }
    .card input[type="submit"] {
        padding: 10px 15px;
        font-size: 16px;
        color: #fff;
        background-color: #711400;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }
    .card input[type="submit"]:hover {
        background-color: #060100;
    }
</style>
</head>

<body>
<div class="form-wrapper">
<div class="card">
    <h2>Send Reply</h2>
    <form action="/send_reply_post#stats" method="post">
        <label for="reply">Reply</label>
        <input
            type="text"
            id="reply"
            name="textfield2"
            required pattern="[a-zA-Z0-9 ]+"
            title="Enter reply"
            placeholder="Enter your reply here">
        <input type="submit" name="Submit" value="Submit Reply">
    </form>
</div>
</body>
</html>

{% endblock %}
