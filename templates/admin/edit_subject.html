{% extends 'admin/indexadmin.html' %}
{% block body %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Subject</title>
<style>
    .card {
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(113, 20, 0, 0.66);
      padding: 20px;
      width: 80%;
      max-width: 500px;
    }


    .form-container {
        background-color: rgba(113, 20, 0, 0);
        color: #fff;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 4px 8px rgba(113, 20, 0, 0.71);
        max-width: 500px;
        width: 100%;
    }

    .form-container h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    .form-group {
        margin-bottom: 15px;
    }

    .form-group label {
        display: block;
        font-weight: bold;
        margin-bottom: 5px;
    }

    .form-group input, .form-group select {
        width: 100%;
        padding: 10px;
        border-radius: 5px;
        border: 1px solid #ccc;
        font-size: 16px;
    }

    .form-group input[type="file"] {
        padding: 5px;
    }

    .form-group input[type="submit"] {
        background-color: #711400;
        color: white;
        border: none;
        cursor: pointer;
        transition: background-color 0.3s ease;
    }

    .form-group input[type="submit"]:hover {
        background-color: rgba(0, 0, 0, 0.87);
    }
</style>
</head>
<body>
<div class="card">
    <h2>Edit Subject</h2>
    <form id="form1" name="form1" method="post" enctype="multipart/form-data" action="/edit_subject_post#stats">
        {% csrf_token %}
        <div class="form-group">
            <label for="course">Course</label>
            <select name="select" id="course" required>
                {% for i in course %}
                <option value="{{ i.id }}" {% if sub.COURSE.id == i.id %} selected{% endif %}>{{ i.course_name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" name="textfield" id="subject" value="{{ sub.subject }}" required pattern="[a-zA-Z0-9 ]+" title="only letters,numbers and spaces are allowed">
        </div>

        <div class="form-group">
            <label for="semester">Semester</label>
            <input type="text" name="textfield2" id="semester" value="{{ sub.semester }}" required pattern="[0-9]{1,2}" title="Enter valid semester">
        </div>

        <div class="form-group">
            <label for="syllabus">Syllabus</label>
            <input type="file" name="textfield3" id="syllabus" required>
            <small>Current file: {{ sub.syllabus }}</small>
        </div>

        <div class="form-group">
            <input type="submit" name="Submit" value="Save">
        </div>
    </form>
</div>
</body>
</html>

{% endblock %}
