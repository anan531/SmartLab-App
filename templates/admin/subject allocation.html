{% extends 'admin/indexadmin.html' %}
{% block body %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subject Allocation Form</title>
<style>
    .card {
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(113, 20, 0, 0.73);
        padding: 20px;
        width: 500px;
    }

    .card h2 {
        text-align: center;
        color: #333;
        margin-bottom: 20px;
    }

    .form-group {
        margin-bottom: 15px;
    }

    .form-group label {
        display: block;
        margin-bottom: 5px;
        color: #555;
        font-weight: bold;
    }

    .form-group input, .form-group select {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
    }

    .form-group input[type="submit"] {
        background-color: #711400;
        color: white;
        border: none;
        cursor: pointer;
        font-size: 16px;
    }

    .form-group input[type="submit"]:hover {
        background-color: #000000;
    }
</style>
</head>
<body>
<div class="card">
    <h2>Subject Allocation</h2>
    <form id="form1" name="form1" method="post" action="/admin_subject_allocation_post#">
        <div class="form-group">
            <label for="date">Date</label>
            <input type="date" id="date" name="textfield" min="1990-01-01" max="2025-12-31" required />
        </div>

        <div class="form-group">
            <label for="staff">Staff</label>
            <select id="staff" name="name" required>
                {% for i in stf %}
                    <option value="{{ i.id }}">{{ i.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="subject">Subject</label>
            <select id="subject" name="subject" required>
                {% for i in sub %}
                    <option value="{{ i.id }}">{{ i.subject }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <input type="submit" name="Submit" value="Add">
        </div>
    </form>
</div>
</body>
</html>

{% endblock %}
