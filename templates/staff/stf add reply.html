{% extends 'staff/indexstaff.html' %}
{% block body %}
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
<title>Untitled Document</title>
<style>
        .form-container {
            max-width: 500px;
            margin: 0 auto 20px auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(113, 20, 0, 0.64);
            padding: 20px;
            text-align: center;
        }

        .form-container input[type="text"] {
            padding: 10px;
            width: 175%;
            border: 1px solid rgba(113, 20, 0, 0.8);
            border-radius: 4px;
            font-size: 16px;
            margin-right: 10px;
        }

        .form-container input[type="submit"] {
            padding: 10px 20px;
            background-color: #711400;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }

        .form-container input[type="submit"]:hover {
            background-color: #060100;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        table thead {
            background-color: #711400;
            color: #fff;
        }

        table th, table td {
            padding: 10px;
            text-align: left;
            border: 1px solid rgba(113, 20, 0, 0.2);
        }

        table tr:nth-child(even) {
            background-color: #f9f9f9;
        }
    </style>
</head>

<body>
<div class="form-container">
<h2>Reply</h2>
<form action="/staff_add_reply_post#stats" method="post"><table width="249" border="1">

  <tr>
    <td>Reply
      <label>
      <input type="text" name="textfield2" required pattern="[a-zA-Z0-9 ]+" title="only letters,numbers and spaces are allowed"/>
      </label></td>
    </tr>
  <tr>
    <td><label>
      <div align="center">
        <input type="submit" name="Submit" value="Add" />
        </div>
    </label></td>
    </tr>
</table>
</form>
</body>
</html>
{% endblock %}
