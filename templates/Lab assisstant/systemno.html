{% extends 'Lab assisstant/indexla.html' %}
{% block body %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System No</title>
    <style>
        .card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(113, 20, 0, 0.78);
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
            margin: 50px auto;
        }

        .card h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }

        input:hover {
            border-color: #555;
        }

        input[type="submit"] {
            background-color: #8B0000;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: background-color 0.3s ease;
            padding: 10px;
        }

        input[type="submit"]:hover {
            background-color: #000000;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Enter System No</h2>
        <form action="/system_no_code#stats" method="post">
            <label for="textfield">System No:</label>
            <input type="text" name="textfield" id="textfield" required/>
            <input type="submit" name="btn" value="Start"/>
            <input type="submit" name="btn" value="View"/>

        </form>
    </div>
</body>
</html>
