{% extends 'staff/indexstaff.html' %}
{% block body %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student</title>
    <style>
        .card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(113, 20, 0, 0.65);
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
        }

        .card h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }

        input[type="text"], input[type="date"], input[type="file"], select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }

        input[type="text"]:hover, input[type="date"]:hover, input[type="file"]:hover, select:hover {
            border-color: #555;
        }

        input[type="submit"] {
            background-color: #8B0000;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        input[type="submit"]:hover {
            background-color: rgba(0, 0, 0, 0.86);
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Add Student</h2>
        <form id="form1" name="form1" method="post" enctype="multipart/form-data" action="/staff_add_student_post#stats">
            {% csrf_token %}

            <label for="course">Course</label>
            <select name="course_name" id="course" required>
                {% for i in cour %}
                    <option value="{{ i.id }}">{{ i.course_name }}</option>
                {% endfor %}
            </select>

            <label for="student_name">Student Name</label>
            <input type="text" name="textfield1" id="student_name" required pattern="[a-zA-Z0-9 ]+" title="only letters,numbers and spaces are allowed">

            <label for="roll_no">Roll No</label>
            <input type="text" name="textfield3" id="roll_no" required pattern="[A-Za-z0-9]{2,10}" title="Roll number should only contain letters and numbers.">

            <label for="image">Image</label>
            <input type="file" name="file2" id="image" required>

            <label for="email">Email</label>
            <input type="text" name="textfield4" id="email" required pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,3}" title="Required correct format">

            <label for="phone_no">Phone No</label>
            <input type="text" name="textfield5" id="phone_no" required pattern="[6789][0-9]{9}" title="Enter valid Phone no">

            <label for="semester">Semester</label>
            <input type="text" name="textfield6" id="semester" required pattern="[0-9]{1,2}" title="Enter valid Semester">

            <label for="gender">Gender</label>
            <select name="lab" id="gender" required>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Others">Others</option>
            </select>

            <label for="post">Post</label>
            <input type="text" name="textfield8" id="post" required pattern="[A-Z a-z.]{3,25}" title="Enter valid Post">

            <label for="place">Place</label>
            <input type="text" name="textfield9" id="place" required pattern="[a-zA-Z0-9 ]+" title="only letters,numbers and spaces are allowed">

            <label for="pin">Pin</label>
            <input type="text" name="textfield10" id="pin" required pattern="[0-9]{6}" title="Enter valid PIN">

            <label for="dob">DOB</label>
            <input type="date" name="textfield11" id="dob" min="1990-01-01" max="2019-12-31" required>

            <label for="qualification">Qualification</label>
            <input type="text" name="textfield12" id="qualification" required pattern="[a-zA-Z0-9 ]+" title="only letters,numbers and spaces are allowed">

            <input type="submit" name="Submit" value="Add">
        </form>
    </div>
</body>
</html>

{% endblock %}
