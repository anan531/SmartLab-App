{% extends 'staff/indexstaff.html' %}
{% block body %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Allocated Subjects</title>
    <style>


        .form-container {
            max-width: 1000px;
            margin: 0 auto 20px auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(113, 20, 0, 0.64);
            padding: 20px;
            text-align: center;
        }

        .form-container input[type="text"] {
            padding: 10px;
            width: 70%;
            border: 1px solid rgba(113, 20, 0, 0.8);
            border-radius: 4px;
            font-size: 16px;
            margin-right: 10px;
        }

        .form-container input[type="submit"] {
            padding: 10px 20px;
            background-color: #711400;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }

        .form-container input[type="submit"]:hover {
            background-color: #060100;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        table thead {
            background-color: #711400;
            color: #fff;
        }

        table th, table td {
            padding: 10px;
            text-align: left;
            border: 1px solid rgba(113, 20, 0, 0.2);
        }

        table tr:nth-child(even) {
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
<div class="form-container">
    <h2>View Allocated Subjects</h2>
    <form action="/staff_view_allocated_subject_post#stats" method="post">
        {% csrf_token %}
        <input type="text" name="textfield" value="{{ s }}" placeholder="Enter Subject Name" />
        <input type="submit" name="Submit" value="Go" />
    </form>
    <table>
        <thead>
            <tr>
                <th>Subject</th>
                <th>Staff</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody>
            {% for i in data %}
            <tr>
                <td>{{ i.SUBJECT.subject }}</td>
                <td>{{ i.STAFF.name }}</td>
                <td>{{ i.date }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>

{% endblock %}
