{% extends 'staff/indexstaff.html' %}
{% block body %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 600px;
            padding: 20px;
            box-sizing: border-box;
        }

        .card h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }

        input:hover, select:hover {
            border-color: #777;
        }

        input[type="submit"] {
            background-color: #8B0000;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s ease;
            padding: 10px;
            border-radius: 5px;
            text-transform: uppercase;
        }

        input[type="submit"]:hover {
            background-color: #a00000;
        }

        .image-preview {
            text-align: center;
            margin-bottom: 20px;
        }

        .image-preview img {
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 200px;
            height: 200px;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Edit Student</h2>
        <form id="form1" name="form1" method="post" action="/staff_edit_student_post#stats" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="hidden" value="{{ stud.id }}" name="id">

            <label for="course_name">Course</label>
            <select name="course_name" id="course_name" required>
                {% for i in cour %}
                    <option value="{{ i.id }}" {% if i.id == stud.COURSE.id %}selected{% endif %}>{{ i.course_name }}</option>
                {% endfor %}
            </select>

            <label for="name">Student Name</label>
            <input type="text" name="textfield1" value="{{ stud.studname }}" required pattern="[a-zA-Z0-9 ]+" title="only letters,numbers and spaces are allowed">

            <label for="roll_no">Roll No</label>
            <input type="text" name="textfield3" value="{{ stud.roll_no }}" required pattern="[A-Za-z0-9]{2,10}" title="Roll number should only contain letters and numbers.">

            <div class="image-preview">
                {% if stud.image.url != "" %}
                    <img src="{{ stud.image.url }}" alt="Previous Image">
                {% else %}
                    <p>No image</p>
                {% endif %}
            </div>

            <label for="file2">Upload New Image</label>
            <input type="file" name="file2" id="file2" required>

            <label for="email">Email</label>
            <input type="text" name="textfield4" value="{{ stud.email }}" required pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,3}" title="Enter a valid email format">

            <label for="phone_no">Phone No</label>
            <input type="text" name="textfield5" value="{{ stud.phone_no }}" required pattern="[6789][0-9]{9}" title="Enter a valid Phone no">

            <label for="semester">Semester</label>
            <input type="text" name="textfield6" value="{{ stud.semester }}" required pattern="[0-9]{1,2}" title="Enter valid Semester">

            <label for="gender">Gender</label>
            <select name="lab" id="gender" required>
                <option value="Male" {% if stud.gender == "Male" %}selected{% endif %}>Male</option>
                <option value="Female" {% if stud.gender == "Female" %}selected{% endif %}>Female</option>
                <option value="Others" {% if stud.gender == "Others" %}selected{% endif %}>Others</option>
            </select>

            <label for="post">Post</label>
            <input type="text" name="textfield8" value="{{ stud.post }}" required pattern="[A-Z a-z.]{3,25}" title="Enter valid Post">

            <label for="place">Place</label>
            <input type="text" name="textfield9" value="{{ stud.place }}" required pattern="[a-zA-Z0-9 ]+" title="only letters,numbers and spaces are allowed">

            <label for="pin">Pin</label>
            <input type="text" name="textfield10" value="{{ stud.pin }}" required pattern="[0-9]{6}" title="Enter valid PIN">

            <label for="dob">DOB</label>
            <input type="date" name="textfield11" value="{{ stud.dob|date:'Y-m-d' }}" min="1990-01-01" max="2019-12-31" required>

            <label for="qualification">Qualification</label>
            <input type="text" name="textfield12" value="{{ stud.qualification }}" required pattern="[a-zA-Z0-9 ]+" title="only letters,numbers and spaces are allowed">

            <input type="submit" name="Submit" value="Save">
        </form>
    </div>
</body>
</html>

{% endblock %}
