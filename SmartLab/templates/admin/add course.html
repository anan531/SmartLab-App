{% extends 'admin/indexadmin.html' %}
{% block body %}
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Management</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;
    color: #333;
    margin: 0;
    padding: 0;
  }

  .form-container {
    max-width: 600px;
    margin: 20px auto;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(113, 20, 0, 0.81);
    padding: 20px;
  }

  form label {
    display: block;
    margin-bottom: 8px;
    font-weight: bold;
  }

  form select,
  form input[type="text"],
  form input[type="submit"] {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 16px;
  }

  form input[type="submit"] {
    background-color: #711400;
    color: #fff;
    border: none;
    cursor: pointer;
    font-weight: bold;
  }

  form input[type="submit"]:hover {
    background-color: #711400;
  }

  .card-container {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
    padding: 20px;
  }

  .card {
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(113, 20, 0, 0.79);
    width: 300px;
    padding: 15px;
    text-align: center;
  }

  .card h3 {
    margin: 0 0 10px;
    font-size: 1.5em;
    color: #007bff;
  }

  .card p {
    margin: 0 0 10px;
    color: #555;
  }

  .card-actions a {
    text-decoration: none;
    color: #fff;
    background-color: #28a745;
    padding: 8px 15px;
    border-radius: 4px;
    margin: 5px;
    display: inline-block;
  }

  .card-actions a:hover {
    background-color: #218838;
  }

  .card-actions .delete {
    background-color: #dc3545;
  }

  .card-actions .delete:hover {
    background-color: #c82333;
  }
</style>
</head>
<body>

<div class="form-container">
  <form id="form1" name="form1" method="post" action="/add_course_post#stats">
    {% csrf_token %}
    <label for="select">Department:</label>
    <select name="select" id="select" required>
        {% for i in dept %}
        <option value="{{ i.id }}">{{ i.department_name }}</option>
        {% endfor %}
    </select>

    <label for="textfield">Course Name:</label>
    <input type="text" name="textfield" id="textfield" required pattern="[a-zA-Z0-9 ]+" title="only letters,numbers and spaces are allowed" placeholder="Enter course name" />

    <label for="textfield2">Details:</label>
    <input type="text" name="textfield2" id="textfield2" required placeholder="Enter course details" />

    <input type="submit" name="Submit" value="Add Course" />
  </form>
</div>

<div class="card-container">
  {% for course in courses %}
  <div class="card">
    <h3>{{ course.course_name }}</h3>
    <p><strong>Department:</strong> {{ course.department_name }}</p>
    <p><strong>Details:</strong> {{ course.details }}</p>
    <div class="card-actions">
      <a href="/edit_course/{{ course.id }}#stats">Edit</a>
      <a href="/delete_course/{{ course.id }}#stats" class="delete" onclick="return confirm('Are you sure you want to delete this course?');">Delete</a>
    </div>
  </div>
  {% endfor %}
</div>

</body>
</html>
{% endblock %}
