{% extends 'admin/indexadmin.html' %}
{% block body %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Department Management</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      color: #333;
      margin: 0;
      padding: 0;
    }

    /* Form container styling */
    .form-container {
      max-width: 400px;
      margin: 20px auto;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(113, 20, 0, 0.75);
      padding: 20px;
    }

    form label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    form input[type="text"],
    form input[type="submit"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 16px;
    }

    form input[type="submit"] {
      background-color: #711400;
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    form input[type="submit"]:hover {
      background-color: #711400;
    }

    /* Card container for displaying departments */
    .card-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      padding: 20px;
      margin-top: 20px;
    }

    /* Individual card styling */
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      width: 300px; /* Set card width */
      padding: 15px;
      text-align: center;
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 1.5em;
      color: #007bff;
    }

    .card p {
      margin: 0 0 10px;
      color: #555;
    }

    /* Action buttons in the card */
    .card-actions a {
      text-decoration: none;
      color: #fff;
      background-color: #28a745;
      padding: 8px 15px;
      border-radius: 4px;
      margin: 5px;
      display: inline-block;
    }

    .card-actions a:hover {
      background-color: #218838;
    }

    .card-actions .delete {
      background-color: #dc3545;
    }

    .card-actions .delete:hover {
      background-color: #c82333;
    }

  </style>
</head>
<body>
  <!-- Form for adding new department -->
  <div class="form-container">
    <form id="form1" name="form1" method="post" action="/admin_add_department_post#stats">
      {% csrf_token %}
      <label for="department_name">
        <input type="text" id="department_name" name="textfield" required pattern="[a-zA-Z0-9 ]+" title="only letters,numbers and spaces are allowed" placeholder="Department Name" />
      </label>
      <label for="details">
        <input type="text" id="details" name="textfield2" required placeholder="Details" />
      </label>
      <input type="submit" name="submit" value="Add Department" />
    </form>
  </div>

  <!-- Displaying departments in card view -->
  <div class="card-container">
    {% for dept in data %}
    <div class="card">
      <h3>{{ dept.department_name }}</h3>
      <p>{{ dept.details }}</p>
      <div class="card-actions">
        <a href="/edit_department/{{ dept.id }}#stats">Edit</a>
        <a href="/delete_department/{{ dept.id }}#stats" onclick="return confirm('Are you sure you want to delete this department?');" class="delete">Delete</a>
      </div>
    </div>
    {% endfor %}
  </div>
</body>
</html>
{% endblock %}
