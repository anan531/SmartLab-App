{% extends 'admin/indexadmin.html' %}
{% block body %}
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
<title>Lab Assignment</title>
  <style>

  .container {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
    margin-top: 20px;
  }

  .card {
    width: 23%;
    min-width: 200px;
    background-color: #f9f9f9;
    border: 1px solid #ddd;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(113, 20, 0, 0.67);
    padding: 20px;
    box-sizing: border-box;
    text-align: center;
    transition: transform 0.3s ease-in-out;
  }

  .card:hover {
    transform: translateY(-5px);
  }

  .card-header {
    font-size: 1.2em;
    font-weight: bold;
    color: #060100;
    margin-bottom: 10px;

  }

  .card-details {
    font-size: 1em;
    color: #666;
    margin-bottom: 20px;
  }

  .card-actions {
    display: flex;
    justify-content: space-around;
  }

  .card-actions a {
    text-decoration: none;
    color: #a72006;
    font-weight: bold;
  }

  .card-actions a:hover {
    text-decoration: underline;
  }

  .form-wrapper {
    width: 100%;
    text-align: center;
    margin-bottom: 30px;
      color: #060100;
      font-weight: bold;


  }

  input[type="text"] {
    padding: 8px;
    margin-right: 10px;
    width: 200px;
    border-radius: 4px;
    border: 1px solid #ddd;
  }

  input[type="submit"] {
    padding: 8px 15px;
    background-color: #060100;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }

  input[type="submit"]:hover {
    background-color: #a72509;
  }

  .add-new {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 20px;
    background-color: #a72509;
    color: white;
    border-radius: 4px;
    text-decoration: none;
  }

  .add-new:hover {
    background-color: rgba(6, 1, 0, 1);
  }
</style>
</head>
<body>
<div class="container">
    <form id="form1" name="form1" method="post" action="/admin_view_assigned_lab_post#stats" class="search-container">
        {% csrf_token %}
        <input type="text" name="textfield" value="{{ s }}" placeholder="Search Lab...">
            <input type="submit" name="Submit" value="Go">
    </form>
</div>

    <div class="container">
        {% for i in data %}
        <div class="card">
            <h3>{{ i.LAB_ASST.name }} (Lab Assistant)</h3>
            <p><strong>Lab No:</strong> {{ i.LAB.Lab_no }}</p>
            <p><strong>Date:</strong> {{ i.date }}</p>
            <div class="card-actions">
                <a href="edit_assign_lab/{{ i.id }}#stats">Edit</a>
                <a href="/delete_assign_lab/{{ i.id }}#stats">Delete</a>
            </div>
        </div>
        {% endfor %}
    </div>
    <div class="form-wrapper">
    <a href="/admin_assign_lab#stats" class="add-new">Add New</a>
</div>
</body>
</html>

{% endblock %}
