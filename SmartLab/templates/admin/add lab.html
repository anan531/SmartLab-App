{% extends 'admin/indexadmin.html' %}
{% block body %}
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
<title>Add Lab</title>
<style>
    .card {
        background: #fff;
        width: 400px;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(113, 20, 0, 0.78);
        padding: 20px;
        border: 1px solid #eaeaea;
    }
    .card h2 {
        text-align: center;
        color: #333;
        margin-bottom: 20px;
        font-size: 22px;
    }
    .card form {
        display: flex;
        flex-direction: column;
    }
    .card label {
        margin-bottom: 5px;
        font-weight: bold;
        color: #555;
    }
    .card input[type="text"] {
        padding: 10px;
        font-size: 14px;
        border: 1px solid #ccc;
        border-radius: 4px;
        margin-bottom: 20px;
    }
    .card input[type="submit"] {
        padding: 10px 15px;
        font-size: 16px;
        color: #fff;
        background-color: #711400;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }
    .card input[type="submit"]:hover {
        background-color: #711400;
    }
</style>
</head>

<body>
<div class="card">
    <h2>Add Lab</h2>
    <form action="/admin_add_lab_post#stats" method="post">
        {% csrf_token %}
        <label for="lab_no">Lab No</label>
        <input
            type="text"
            id="lab_no"
            name="textfield"
            required
            pattern="[0-9]{1,2}"
            title="Enter valid Lab no"
            placeholder="Enter Lab Number">

        <label for="floor_no">Floor No</label>
        <input
            type="text"
            id="floor_no"
            name="textfield2"
            required
            pattern="[0-9]{1}"
            title="Enter valid Floor no"
            placeholder="Enter Floor Number">

        <input type="submit" name="Submit" value="Add Lab">
    </form>
</div>
</body>
</html>

{% endblock %}
