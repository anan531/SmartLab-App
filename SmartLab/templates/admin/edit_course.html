{% extends 'admin/indexadmin.html' %}
{% block body %}
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
<title>Untitled Document</title><style>


    .card {
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(113, 20, 0, 0.66);
      padding: 20px;
      width: 80%;
      max-width: 300px;
    }

    .card h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }

    .form-group input[type="submit"] {
      background-color: #711400;
      color: white;
      border: none;
      cursor: pointer;
      padding: 10px;
      width: 100%;
      border-radius: 4px;
    }

    .form-group input[type="submit"]:hover {
      background-color: #a02708;
    }

    .form-group input[readonly] {
      background-color: #f0f0f0;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>Edit Course</h2>
    <form id="form1" name="form1" method="post" action="/edit_course_post#stats">
      <div class="form-group">
        <label for="select">Department</label>
        <select name="select" required>
          {% for i in dept %}
            <option value="{{ i.id }}" {% if cour.DEPT.id == i.id %} selected{% endif %}>{{ i.department_name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="textfield">Course Name</label>
        <input type="text" name="textfield" value="{{ cour.course_name }}" required pattern="[a-zA-Z0-9 ]+" title="only letters,numbers and spaces are allowed"/>
      </div>

      <div class="form-group">
        <label for="textfield2">Details</label>
        <input type="text" name="textfield2" value="{{ cour.details }}" required />
      </div>

      <div class="form-group">
        <div align="center">
          <input type="submit" name="Submit" value="Save" />
        </div>
      </div>
    </form>
  </div>
</body>
</html>
{% endblock %}
